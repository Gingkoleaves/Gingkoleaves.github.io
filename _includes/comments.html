<script>
(function () {
  function resolveGiscusTheme(theme) {
    return theme === 'light' ? 'light' : 'dark_dimmed';
  }

  function syncGiscusTheme(theme) {
    const frame = document.querySelector('iframe.giscus-frame');
    if (!frame) {
      return;
    }

    frame.contentWindow.postMessage(
      {
        giscus: {
          setConfig: {
            theme: resolveGiscusTheme(theme)
          }
        }
      },
      'https://giscus.app'
    );
  }

  const currentTheme = document.body.dataset.theme || 'dark';
  syncGiscusTheme(currentTheme);

  window.addEventListener('load', function () {
    syncGiscusTheme(document.body.dataset.theme || 'dark');
  });

  document.addEventListener('site-theme-change', function (event) {
    syncGiscusTheme(event.detail && event.detail.theme ? event.detail.theme : 'dark');
  });
})();
</script>
