<nav class="toolbar">
  <div class="logo">Gingkoleaves</div>
  <ul>
    <li><a href="/">Homepage</a></li>
    <li><a href="/notes">Notes</a></li>
    <li><a href="/talks">Talks</a></li>
    <li><a href="/friends/">友链</a></li>
    <li><button class="theme-toggle" type="button" aria-label="切换明暗主题">Night</button></li>
  </ul>
</nav>

<style>
.toolbar {
  position: fixed; top: 0; left: 0; right: 0; width: 100%; height: 60px;
  box-sizing: border-box;
  background: var(--toolbar-bg); color: var(--toolbar-text); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--toolbar-border);
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 50px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
.toolbar .logo { font-weight: 700; }
.toolbar ul { display: flex; list-style: none; align-items: center; gap: 20px; margin: 0; padding: 0; }
.toolbar li { margin-left: 20px; }
.toolbar a, .theme-toggle { color: inherit; }
.toolbar a { text-decoration: none; }
.theme-toggle {
  border: 1px solid currentColor;
  background: transparent;
  padding: 6px 12px;
  border-radius: 999px;
  cursor: pointer;
  font: inherit;
}

body[data-theme="light"] .theme-toggle::after { content: "Day"; }
body[data-theme="dark"] .theme-toggle::after { content: "Night"; }

.theme-toggle { min-width: 76px; }
</style>

<script>
(function () {
  const storageKey = 'gingkoleaves-theme';
  const body = document.body;
  const button = document.querySelector('.theme-toggle');

  function applyTheme(theme) {
    body.dataset.theme = theme;
    if (button) {
      button.textContent = theme === 'dark' ? 'Night' : 'Day';
      button.setAttribute('aria-label', theme === 'dark' ? '切换到白天主题' : '切换到夜晚主题');
    }
    document.dispatchEvent(new CustomEvent('site-theme-change', { detail: { theme: theme } }));
  }

  const savedTheme = localStorage.getItem(storageKey);
  const preferredTheme = savedTheme || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  applyTheme(preferredTheme);

  if (button) {
    button.addEventListener('click', function () {
      const nextTheme = body.dataset.theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem(storageKey, nextTheme);
      applyTheme(nextTheme);
    });
  }
})();
</script>
